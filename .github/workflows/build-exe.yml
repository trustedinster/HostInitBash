name: Build H-Side Init Executable

on:
  push:
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]

permissions:
  contents: write
  packages: write

jobs:
  build-exe:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v6

    - name: Download Icon
      run: |
        Invoke-WebRequest -Uri "https://raw.githubusercontent.com/trustedinster/ZASCA/refs/heads/master/static/img/favicon.ico" -OutFile "app_icon.ico"
        echo "Icon downloaded to app_icon.ico"

    - name: Configure CMake
      run: cmake -B build -DCMAKE_BUILD_TYPE=Release

    - name: Build
      run: cmake --build build --config Release

    - name: Upload artifact
      if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
      uses: actions/upload-artifact@v4
      with:
        name: h-side-init-executable
        path: build/Release/h_side_init.exe

  release:
    needs: build-exe
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write
      packages: write

    steps:
    - name: Download artifacts
      uses: actions/download-artifact@v7
      with:
        name: h-side-init-executable
        path: .

    - name: Create Release
      id: create_release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref_name }}
        release_name: Release ${{ github.ref_name }}
        draft: false
        prerelease: false

    - name: Upload Release Asset
      id: upload-release-asset
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ./h_side_init.exe
        asset_name: h_side_init.exe
        asset_content_type: application/vnd.microsoft.portable-executable
